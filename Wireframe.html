<!DOCTYPE html>
<html>
<head>
    <title>Hair and Beauty Parlour Listing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {font-family: Arial; margin:0; background:#f9f9f9;}
        header{background:black;color:white;padding:15px;text-align:center;}
        .hero{background:pink;text-align:center;padding:20px;}
        .controls{text-align:center;margin:15px;}
        input, select, button{padding:10px;margin:5px;width:80%;max-width:300px;}
        .container{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:15px;}
        .card{background:white;padding:15px;border-radius:10px;text-align:center;box-shadow:0 0 5px gray;}
        footer{background:black;color:white;text-align:center;padding:10px;}
        @media(max-width:768px){.container{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:480px){.container{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<header>
    <h2>Hair and Beauty Parlour Listing</h2>
</header>

<div class="hero">Find Parlours Near You</div>

<div class="controls">
    <h3>Register Your Parlour</h3>
    <input type="text" id="parlourName" placeholder="Parlour Name"><br>
    <select id="parlourLocation">
        <option value="">Select Location</option>
        <option>Gaborone</option>
        <option>Francistown</option>
        <option>Maun</option>
        <option>Kasane</option>
    </select><br>
    <input type="text" id="parlourServices" placeholder="Services (Hair, Nails, Makeup)"><br>
    <button onclick="registerParlour()">Register Parlour</button>
</div>

<div class="controls">
    <select id="locationFilter" onchange="filterParlours()">
        <option value="all">All Locations</option>
        <option>Gaborone</option>
        <option>Francistown</option>
        <option>Maun</option>
        <option>Kasane</option>
    </select>
</div>

<div class="container" id="parlourList">
    <!-- Registered parlours will appear here -->
</div>

<footer>© 2026 Hair and Beauty Parlour Listing</footer>

<script>
let parlours = [];

function registerParlour() {
    let name = document.getElementById("parlourName").value;
    let location = document.getElementById("parlourLocation").value;
    let services = document.getElementById("parlourServices").value;

    if(!name || !location || !services){
        alert("Please fill all fields!");
        return;
    }

    let parlour = {name, location, services};
    parlours.push(parlour);

    displayParlours();
    clearForm();
}

function displayParlours() {
    let container = document.getElementById("parlourList");
    container.innerHTML = "";

    let filter = document.getElementById("locationFilter").value;

    parlours.forEach(p => {
        if(filter === "all" || p.location === filter){
            let card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<h3>${p.name}</h3>
                              <p>Location: ${p.location}</p>
                              <p>Services: ${p.services}</p>`;
            container.appendChild(card);
        }
    });
}

function filterParlours() {
    displayParlours();
}

function clearForm() {
    document.getElementById("parlourName").value = "";
    document.getElementById("parlourLocation").value = "";
    document.getElementById("parlourServices").value = "";
}
</script>

</body>
</html>
