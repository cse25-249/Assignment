<!DOCTYPE html>
<html>
<head>
    <title>Hair and Beauty Parlour Listing - Wireframe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {font-family: Arial; margin:0; background:#f0f0f0;}
        header{background:#ccc;color:black;padding:15px;text-align:center;}
        .hero{background:#ddd;text-align:center;padding:20px;}
        .section{padding:20px;}
        .form-box, .card {background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 0 3px gray;}
        .container{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
        @media(max-width:768px){.container{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:480px){.container{grid-template-columns:1fr;}}
        button, input, select {width:100%; padding:10px; margin:5px 0; background:#eee; border:none;}
    </style>
</head>
<body>

<header>
    Hair and Beauty Parlour Listing - Wireframe
</header>

<div class="hero">
    Hero Section (Banner / Image)
</div>

<div class="section">
    <h3>Parlour Registration Form (Wireframe)</h3>
    <div class="form-box">
        <input type="text" placeholder="Parlour Name">
        <select>
            <option>Select Location</option>
        </select>
        <input type="text" placeholder="Services">
        <button>Register Parlour</button>
    </div>
</div>

<div class="section">
    <h3>Filter by Location (Wireframe)</h3>
    <div class="form-box">
        <select>
            <option>All Locations</option>
        </select>
        <button>Filter</button>
    </div>
</div>

<div class="section">
    <h3>Parlour Listings (Wireframe)</h3>
    <div class="container">
        <div class="card">Parlour Card</div>
        <div class="card">Parlour Card</div>
        <div class="card">Parlour Card</div>
        <div class="card">Parlour Card</div>
        <div class="card">Parlour Card</div>
    </div>
</div>

<footer style="text-align:center; padding:10px; background:#ccc;">
    Footer
</footer>

</body>
</html>
