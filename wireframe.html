<!DOCTYPE html>
<html>
<head>
    <title>Wireframe</title>
    <style>
        body {
            font-family: Arial;
        }

        .header, .footer {
            border: 2px solid black;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }

        .nav {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
            text-align: center;
        }

        .hero {
            border: 2px dashed black;
            height: 150px;
            margin: 10px;
            text-align: center;
            line-height: 150px;
        }

        .section {
            display: flex;
            justify-content: space-around;
            margin: 10px;
        }

        .card {
            border: 2px solid black;
            width: 150px;
            height: 100px;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>

<body>

<div class="header">LOGO</div>

<div class="nav">
    Hair | Nails | Makeup | Manicure | Pedicure | List Business
</div>

<div class="hero">Search Bar / Banner</div>

<h3 style="text-align:center;">Categories</h3>
<div class="section">
    <div class="card">Hair</div>
    <div class="card">Nails</div>
    <div class="card">Makeup</div>
    <div class="card">Manicure</div>
    <div class="card">Pedicure</div>
</div>

<h3 style="text-align:center;">Featured Listings</h3>
<div class="section">
    <div class="card">Salon 1</div>
    <div class="card">Salon 2</div>
    <div class="card">Salon 3</div>
</div>

<div class="footer">Footer (Contact Info)</div>

</body>
</html>
